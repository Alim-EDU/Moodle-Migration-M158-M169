services:
  db:
    image: 'mysql:8.4'
    restart: 'always'
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE:-moodle}
      - MYSQL_USER=${MYSQL_USER:-moodle}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-Secret}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-Secret}
    command: --mysql-native-password=ON
    volumes:
      - 'mysql_data:/var/lib/mysql'
    container_name: newmoodle_db_1
    networks:
      - moodlenet
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-Secret}"]
      interval: 10s
      timeout: 5s
      retries: 5

  moodle:
    image: 'moodlehq/moodle-php-apache:8.3'
    restart: 'always'
    ports:
      - '80:80'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - 'moodle_app:/var/www/html'
      - 'moodle_data:/var/www/moodledata'
    container_name: newmoodle_web_1
    environment:
      - MOODLE_DOCKER_DBTYPE=mysqli
      - MOODLE_DOCKER_DBHOST=db
      - MOODLE_DOCKER_DBNAME=${MYSQL_DATABASE:-moodle}
      - MOODLE_DOCKER_DBUSER=${MYSQL_USER:-moodle}
      - MOODLE_DOCKER_DBPASS=${MYSQL_PASSWORD:-Secret}
      - MOODLE_DOCKER_WEB_HOST=localhost
    networks:
      - moodlenet

  pma:
    image: phpmyadmin/phpmyadmin
    container_name: pma
    restart: always
    networks:
      - moodlenet
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=${MYSQL_ROOT_PASSWORD:-Secret}

volumes:
  mysql_data:
    driver: local
  moodle_app:
    driver: local
    name: newmoodle_moodle_app
  moodle_data:
    driver: local
    name: newmoodle_moodle_data

networks:
  moodlenet:
    driver: bridge
